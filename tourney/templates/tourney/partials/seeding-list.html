{% csrf_token %}
<div id="sortable-seeding"
     class="drag-drop-container"
     x-data="seedingList('{% url 'tourney:tourney-update-seeding-order' tournament.code %}')"
     x-sort="handleSort()"
     x-sort:config="{ ghostClass: 'dragging', animation: 150 }">
    {% for stage_player in stage_players %}
        <div class="drag-drop-item seeding-item"
             x-sort:item="{{ stage_player.id }}"
             data-player-id="{{ stage_player.id }}">
            <div class="drag-handle" x-sort:handle>⋮⋮</div>
            <span class="seed-number">{{ stage_player.seed }}</span>
            <div class="drag-drop-content player-info">
                <div>
                    <span class="player-name">{{ stage_player.player.get_display_name }}</span>
                    {% if stage_player.player.is_guest %}
                        <span class="player-guest-badge"></span>
                    {% endif %}
                </div>
            </div>
        </div>
    {% empty %}
        <p class="text-muted">No players found for seeding.</p>
    {% endfor %}
</div>
